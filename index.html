<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsere Foto-Ecke</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            /* Pastell-Roter Farbverlauf */
            background: linear-gradient(135deg, #fff5f5 0%, #fed7d7 100%);
            color: #4a5568;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(229, 62, 62, 0.1);
            width: 85%;
            max-width: 380px;
            /* Zentrierung im Viewport */
            box-sizing: border-box;
        }
        h1 { 
            margin-bottom: 2rem; 
            font-size: 1.6rem; 
            color: #c53030; /* Dunkleres Pastell-Rot */
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        /* Haupt-Button: Pastell-Rot */
        .btn-upload {
            background-color: #f56565;
            color: white;
            box-shadow: 0 4px 12px rgba(245, 101, 101, 0.3);
        }
        /* Sekundärer Button: Weiß mit rotem Rand */
        .btn-view {
            background-color: #ffffff;
            color: #f56565;
            border: 2px solid #f56565;
        }
        .btn:active { 
            transform: scale(0.96); 
        }
        .btn:hover {
            opacity: 0.9;
        }
        p { 
            font-size: 0.85rem; 
            color: #a0aec0; 
            margin-top: 1.5rem; 
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📸 Unsere Fotos</h1>
        
        <a href="https://www.dropbox.com/scl/fo/6k6345npu33x01iejlyte/AHQpeqRScZKm4GIQWif07gw?rlkey=jc0j3tdrwze1e8f79tfoxcx12&st=yh0qoujv&dl=0" class="btn btn-upload">
            Fotos hochladen
        </a>

        <a href="https://1drv.ms/f/c/2d88dcea25fdfa5c/IgCDIubzxmN_S7MBy5sgmzpFAd53TWzu3nWexSQRcBAMHJQ?e=4cqKQq" class="btn btn-view">
            Galerie ansehen
        </a>

        <p>Ganz einfach ohne Anmeldung</p>
    </div>

</body>
</html>
