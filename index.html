<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsere Foto-Ecke</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fff5f5 0%, #fed7d7 100%);
            color: #4a5568;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(229, 62, 62, 0.1);
            width: 85%;
            max-width: 380px;
            box-sizing: border-box;
        }
        h1 { 
            margin-bottom: 1.8rem; 
            font-size: 1.6rem; 
            color: #c53030; 
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        /* Button 1: Haupt-Aktion (Upload) */
        .btn-upload {
            background-color: #f56565;
            color: white;
            box-shadow: 0 4px 12px rgba(245, 101, 101, 0.3);
        }
        /* Button 2: Galerie */
        .btn-view {
            background-color: #ffffff;
            color: #f56565;
            border: 2px solid #f56565;
        }
        /* Trennlinie */
        hr {
            border: 0;
            height: 1px;
            background-color: #edf2f7; /* Sehr feines Grau */
            margin: 20px auto;
            width: 80%;
        }
        /* Button 3: Zusatz-Button (Dezenter) */
        .btn-extra {
            background-color: #f7fafc;
            color: #718096;
            font-size: 0.95rem;
            border: 1px solid #e2e8f0;
        }
        .btn:active { 
            transform: scale(0.96); 
        }
        .btn:hover {
            opacity: 0.9;
        }
        p { 
            font-size: 0.85rem; 
            color: #a0aec0; 
            margin-top: 1.5rem; 
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📸 Unsere Fotos</h1>
        
        <a href="HIER_DEIN_DROPBOX_DATEIANFRAGE_LINK" class="btn btn-upload">
            Fotos hochladen
        </a>

        <a href="HIER_DEIN_DROPBOX_ANSCHAUEN_LINK" class="btn btn-view">
            Galerie ansehen
        </a>

        <hr>

        <a href="HIER_DEIN_DRITTER_LINK" class="btn btn-extra">
            Zusatz-Info / Programm
        </a>

        <p>Ganz einfach ohne Anmeldung</p>
    </div>

</body>
</html>
